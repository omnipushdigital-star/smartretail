<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="OmniPush: The Enterprise-Grade Smart Retail Display Management System. Manage global signage networks with real-time monitoring, dynamic layouts, and edge delivery." />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="OmniPush Digital" />
  <meta property="og:title" content="OmniPush | Smart Retail Display CMS" />
  <meta property="og:description" content="Cloud-based digital signage platform for retail chains." />
  <meta property="og:image" content="/omnipush_dashboard_mockup.png" />
  <title>OmniPush | Smart Retail Display CMS</title>
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      var div = document.createElement('div');
      div.style.position = 'fixed'; div.style.top = '0'; div.style.left = '0';
      div.style.width = '100%'; div.style.background = 'red'; div.style.color = 'white';
      div.style.zIndex = '1000000'; div.style.padding = '10px'; div.style.fontSize = '12px';
      div.style.wordBreak = 'break-all';
      div.innerHTML = 'JS Error: ' + msg + '<br/>File: ' + url + '<br/>Line: ' + lineNo;
      document.body.appendChild(div);
      return false;
    };
    window.onunhandledrejection = function (event) {
      var div = document.createElement('div');
      div.style.position = 'fixed'; div.style.top = '50px'; div.style.left = '0';
      div.style.width = '100%'; div.style.background = 'orange'; div.style.color = 'white';
      div.style.zIndex = '1000000'; div.style.padding = '10px'; div.style.fontSize = '12px';
      div.innerHTML = 'Unhandled Promise Rejection: ' + event.reason;
      document.body.appendChild(div);
    };
  </script>
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
